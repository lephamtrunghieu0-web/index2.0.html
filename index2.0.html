<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Apple</title>

<style>
body {margin:0; font-family:Arial;}

#QuocGia {
    background:#f5f5f7;
    padding:10px;
}

#navigation {
    padding:10px;
    border-bottom:1px solid #ccc;
}

#navigation a {
    margin:10px;
    text-decoration:none;
    color:black;
}

#NoiDung {padding:40px;}

h1 {font-size:40px;}
h2 {color:gray; font-weight:normal;}

button {
    padding:8px 15px;
    border-radius:20px;
    border:none;
    margin:5px;
}

button:first-of-type {
    background:#0071e3;
    color:white;
}
</style>

</head>

<body>

<div id="QuocGia" align="center">
    <p>Chọn quốc gia hoặc khu vực khác</p>

    <select>
        <option>Việt Nam</option>
        <option>United States</option>
        <option>Japan</option>
    </select>

    <button>Tiếp Tục</button>
</div>


<div id="navigation" align="center">
    <a>🍎</a>
    <a>Store</a>
    <a>Mac</a>
    <a>iPad</a>
    <a>iPhone</a>
</div>


<div id="NoiDung" align="center">
    <h1>MacBook Neo</h1>
    <h2>Amazing Mac. Surprising price.</h2>

    <button>Learn more</button>
    <button>Buy</button>

    <br><br>

    <img src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/macbook-neo-color-unselect-202603-gallery-1?wid=5120&hei=3280&fmt=webp&qlt=90" width="500">
</div>

</body>
</html>
